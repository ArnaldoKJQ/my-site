<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — {{SITE_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▣</text></svg>">
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursor-dot"></div>

<nav class="nav" style="mix-blend-mode:normal;background:rgba(8,8,8,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);">
  <a href="index.html" class="nav-logo" style="opacity:1;transform:none;">{{SITE_NAME}}</a>
  <div class="nav-right" style="opacity:1;transform:none;">
    <a href="index.html" class="nav-blog-link">Home</a>
    <a href="admin.html" class="nav-blog-link">Admin</a>
  </div>
</nav>

<div class="blog-page">
  <div class="blog-page-header">
    <div class="blog-page-eyebrow">Writing</div>
    <h1 class="blog-page-title">Blog</h1>
  </div>

  <div class="blog-list" id="blog-list">
    {{BLOG_POSTS_HTML}}
  </div>
</div>

<footer class="site-footer">
  <span>{{SITE_NAME}} © <span id="footer-year"></span></span>
  <span>Node.js + GitHub Pages</span>
</footer>

<div class="toast" id="toast"></div>
<script src="js/main.js"></script>
<script>
  // Simple cursor for non-home pages
  const cursor = document.getElementById('cursor');
  const dot = document.getElementById('cursor-dot');
  let mx=0,my=0,cx=0,cy=0;
  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+'px'; dot.style.top=my+'px';
  });
  (function tick(){
    cx+=(mx-cx)*.12; cy+=(my-cy)*.12;
    cursor.style.left=cx+'px'; cursor.style.top=cy+'px';
    requestAnimationFrame(tick);
  })();
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-hover'));
  });
</script>
</body>
</html>
